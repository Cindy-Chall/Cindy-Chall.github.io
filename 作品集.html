  <title>作品集</title>
  <style>
    :root {
      color-scheme: light;
      --page-width: 8064px;
      --canvas: #ffffff;
      --gap: 0;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--canvas);
    }

    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    }

    .portfolio {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--gap);
      padding: var(--gap) 0;
    }

    .page {
      width: min(100vw, var(--page-width));
      margin: 0;
      background: #ffffff;
      line-height: 0;
      overflow: hidden;
    }

    .page img {
      display: block;
      width: 100%;
      height: auto;
      border: 0;
      user-select: none;
      -webkit-user-drag: none;
    }

    @media print {
      :root {
        --gap: 0;
      }

      body {
        background: #ffffff;
      }

      .portfolio {
        padding: 0;
        gap: 0;
      }

      .page {
        width: 100%;
        page-break-after: always;
      }
    }
  </style>
</head>
